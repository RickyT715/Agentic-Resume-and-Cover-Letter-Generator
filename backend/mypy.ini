[mypy]
python_version = 3.11
warn_return_any = false
warn_unused_configs = true
disallow_untyped_defs = false
check_untyped_defs = true
ignore_missing_imports = true
no_implicit_optional = true
show_error_codes = true
warn_redundant_casts = true
warn_unused_ignores = true

[mypy-tests.*]
disallow_untyped_defs = false
check_untyped_defs = false
ignore_errors = true

[mypy-alembic.*]
ignore_errors = true

[mypy-alembic.env]
ignore_errors = true

[mypy-services.*]
ignore_errors = true

[mypy-agents.*]
ignore_errors = true

[mypy-api.*]
# No ignore_errors - these files are type-checked

[mypy-middleware.*]
# No ignore_errors - these files are type-checked

[mypy-evaluation.ats_scorer]
ignore_errors = true
